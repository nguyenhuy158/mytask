repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(\.secrets\.baseline|.*\.lock|pnpm-lock\.yaml|uv\.lock|frontend/pnpm-lock\.yaml|backend/.*\.lock)$

  - repo: local
    hooks:
      - id: backend-lint
        name: Backend Lint
        entry: make lint
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: backend-test
        name: Backend Tests
        entry: make test-backend
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: frontend-test
        name: Frontend Tests
        entry: make test-frontend
        language: system
        pass_filenames: false
        stages: [pre-commit]
