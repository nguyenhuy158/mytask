services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/tasks.db
    volumes:
      - sqlite_data:/app/backups
      - sqlite_db:/app/data
    expose:
      - "8000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    depends_on:
      - backend
    expose:
      - "80"
    restart: always

volumes:
  sqlite_data:
  sqlite_db:
